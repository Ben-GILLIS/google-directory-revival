<html>
<head>
<title>Google Directory</title>

<script>
function setfocus() {
    if (document.f && document.f.q) document.f.q.focus();
}
</script>

</head>

<body bgcolor="#ffffff" text="#000000" link="#0000cc" vlink="#551a8b" alink="#ff0000" onload="setfocus()">

<form method="GET" action="http://www.google.com/search" name="f">

<br>

<table width="100%" cellpadding="0" cellspacing="0">

        <font size="-1">

        </p>

        <b><a href="http://directory.google.com/Top/Computers/">Computers</a></b><br>
        <font size="-1">

<!-- Revival script -->
<script>
window.addEventListener("DOMContentLoaded", function () {

    var searchForm = document.forms.f;
    var searchBox  = searchForm.q;
    var catRadios  = searchForm.cat;

    function findCategoryLink(text) {
        return Array.from(document.querySelectorAll("a"))
            .find(a => a.textContent.trim() === text);
    }

    var catArts      = findCategoryLink("Arts");
    var catBusiness  = findCategoryLink("Business");
    var catComputers = findCategoryLink("Computers");
    var catTop       = findCategoryLink("Top");

    var resultsDiv = document.createElement("div");
    resultsDiv.id = "wiki-results";
    resultsDiv.style.padding = "20px";
    resultsDiv.style.fontFamily = "Verdana";
    resultsDiv.style.fontSize = "12px";

    var articleDiv = document.createElement("div");
    articleDiv.id = "wiki-article";
    articleDiv.style.padding = "20px";
    articleDiv.style.fontFamily = "Verdana";
    articleDiv.style.fontSize = "12px";

    document.body.appendChild(resultsDiv);
    document.body.appendChild(articleDiv);

    function cacheKey(type, key) {
        return "gdrevival_" + type + "_" + key;
    }

    function setCache(type, key, data) {
        localStorage.setItem(cacheKey(type, key), JSON.stringify({
            time: Date.now(),
            data: data
        }));
    }

    function getCache(type, key) {
        var raw = localStorage.getItem(cacheKey(type, key));
        if (!raw) return null;
        var payload = JSON.parse(raw);
        if (Date.now() - payload.time > 86400000) {
            localStorage.removeItem(cacheKey(type, key));
            return null;
        }
        return payload.data;
    }

    function isTopBar(el) {
        return el.tagName === "TABLE" || el === searchForm;
    }

    function stripForResults() {
        Array.from(document.body.children).forEach(function (el) {
            if (el === resultsDiv || el === articleDiv) return;
            if (!isTopBar(el)) el.style.display = "none";
        });
    }

    function stripForArticle() {
        Array.from(document.body.children).forEach(function (el) {
            if (el === articleDiv) return;
            if (!isTopBar(el)) el.style.display = "none";
        });
    }

    async function searchDirectory() {
        var q = searchBox.value.trim();
        if (!q) return;

        stripForResults();
        resultsDiv.innerHTML = "<b>Searching Wikipedia…</b>";
        articleDiv.innerHTML = "";

        var cached = getCache("search", q);
        if (cached) return renderSearchResults(cached);

        var url = "https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch="
            + encodeURIComponent(q) + "&format=json&origin=*";

        var data = await fetch(url).then(r => r.json());
        setCache("search", q, data);
        renderSearchResults(data);
    }

    function renderSearchResults(data) {
        var html = "<h2>Wikipedia Results</h2>";
        data.query.search.forEach(function (item) {
            html += `
                <div style="margin-bottom:12px;">
                    <a href="#" style="color:#1a0dab;"
                       onclick="loadWikiArticle('${item.title.replace(/'/g, "\\'")}'); return false;">
                        ${item.title}
                    </a>
                    <div>${item.snippet}...</div>
                </div>
            `;
        });
        resultsDiv.innerHTML = html;
    }

    window.loadWikiArticle = async function (title) {
        stripForArticle();
        articleDiv.innerHTML = "<b>Loading article…</b>";

        var cached = getCache("article", title);
        if (cached) return renderArticle(title, cached);

        var url = "https://en.wikipedia.org/api/rest_v1/page/html/" + encodeURIComponent(title);
        var html = await fetch(url).then(r => r.text());
        setCache("article", title, html);
        renderArticle(title, html);
    };

    function renderArticle(title, html) {
        articleDiv.innerHTML = `
            <h2>${title}</h2>
            <div>${html}</div>
        `;
    }

    async function loadCategory(catName) {
        stripForResults();
        articleDiv.innerHTML = "";
        resultsDiv.innerHTML = "<b>Loading category " + catName + "…</b>";

        var cached = getCache("category", catName);
        if (cached) return renderCategory(catName, cached);

        var url = "https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch="
            + encodeURIComponent("Category:" + catName) + "&format=json&origin=*";

        var data = await fetch(url).then(r => r.json());
        setCache("category", catName, data);
        renderCategory(catName, data);
    }

    function renderCategory(catName, data) {
        var html = "<h2>" + catName + " (Wikipedia)</h2>";
        data.query.search.forEach(function (item) {
            html += `
                <div style="margin-bottom:12px;">
                    <a href="#" style="color:#1a0dab;"
                       onclick="loadWikiArticle('${item.title.replace(/'/g, "\\'")}'); return false;">
                        ${item.title}
                    </a>
                    <div>${item.snippet}...</div>
                </div>
            `;
        });
        resultsDiv.innerHTML = html;
    }

    function searchWeb() {
        var q = searchBox.value.trim();
        if (!q) return;
        window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
    }

    searchForm.addEventListener("submit", function (e) {
        e.preventDefault();
        var useDirectory = catRadios[0].checked;
        if (useDirectory) searchDirectory();
        else searchWeb();
    });

    if (catArts)      catArts.addEventListener("click", function (e) { e.preventDefault(); loadCategory("Arts"); });
    if (catBusiness)  catBusiness.addEventListener("click", function (e) { e.preventDefault(); loadCategory("Business"); });
    if (catComputers) catComputers.addEventListener("click", function (e) { e.preventDefault(); loadCategory("Computers"); });
    if (catTop)       catTop.addEventListener("click", function (e) { e.preventDefault(); loadCategory("Top"); });

});
</script>

</body>
</html>
